  <style>
    :root {
      --ig-1: #405DE6;
      --ig-2: #833AB4;
      --ig-3: #C13584;
      --ig-4: #E1306C;
      --ig-5: #FD1D1D;
      --ig-6: #F77737;
      --ig-7: #FCAF45;
      --ink: #262626;
      --muted: #8e8e8e;
      --card-bg: #ffffff;
      --border: #e9e9e9;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Kanit', sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--ig-1), var(--ig-2) 25%, var(--ig-3) 45%, var(--ig-4) 60%, var(--ig-5) 75%, var(--ig-6) 88%, var(--ig-7));
      background-attachment: fixed;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    .brand {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand h1 {
      color: #fff;
      font-weight: 700;
      font-size: clamp(22px, 4.5vw, 34px);
      margin: 0 0 6px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.18);
      letter-spacing: 0.3px;
    }

    .brand p {
      color: rgba(255,255,255,0.9);
      font-weight: 300;
      margin: 0;
      font-size: 14px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      border-radius: 22px;
      padding: 22px 26px 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.22);
    }

    /* ----- Tabs ----- */
    .tabs {
      display: flex;
      gap: 6px;
      background: #f4eef7;
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 22px;
    }
    .tab {
      flex: 1;
      border: none;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      font-weight: 500;
      font-size: 13.5px;
      padding: 10px 8px;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }
    .tab.active {
      background: #fff;
      color: var(--ig-3);
      font-weight: 600;
      box-shadow: 0 3px 10px rgba(129,58,180,0.14);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 7px;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    select, input {
      width: 100%;
      font-family: 'Kanit', sans-serif;
      font-size: 14px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: #fafafa;
      color: var(--ink);
      transition: border-color 0.15s ease, background 0.15s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e8e' stroke-width='2'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
      padding-right: 34px;
    }

    select:disabled, input:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    select:focus, input:focus {
      outline: none;
      border-color: var(--ig-3);
      background: #fff;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 14px;
    }

    .hint.error { color: var(--ig-5); }
    .hint.ok { color: #2e8b57; }

    /* ----- Repeat block ----- */
    .repeat-box {
      background: #faf7fc;
      border: 1px solid #f0e6f3;
      border-radius: 14px;
      padding: 14px 14px 4px;
      margin-bottom: 18px;
    }
    .repeat-count-wrap { display: none; }
    .repeat-count-wrap.show { display: block; }

    button.submit {
      width: 100%;
      border: none;
      cursor: pointer;
      padding: 13px 12px;
      border-radius: 14px;
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      background: linear-gradient(90deg, var(--ig-2), var(--ig-4) 50%, var(--ig-6));
      background-size: 200% auto;
      transition: background-position 0.35s ease, transform 0.15s ease, opacity 0.15s ease;
      margin-top: 6px;
    }

    button.submit:hover:not(:disabled) { background-position: right center; }
    button.submit:active:not(:disabled) { transform: scale(0.98); }
    button.submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .booked-panel {
      margin: -6px 0 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #faf7fb;
      border: 1px solid #f0e6f3;
    }
    .booked-panel-title {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ig-3);
      margin-bottom: 8px;
    }
    .booked-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 140px;
      overflow-y: auto;
    }
    .booked-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      background: #fff;
      border-radius: 9px;
      padding: 7px 10px;
      border: 1px solid var(--border);
    }
    .booked-list .time { font-weight: 600; color: var(--ig-4); white-space: nowrap; }
    .booked-list .who { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ----- Cancel list ----- */
    .cancel-list {
      list-style: none;
      margin: 16px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cancel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
    }
    .ci-room { font-size: 13.5px; font-weight: 600; color: var(--ink); }
    .ci-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ci-cancel {
      border: none;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      font-weight: 500;
      font-size: 12.5px;
      padding: 8px 14px;
      border-radius: 10px;
      color: var(--ig-5);
      background: #fdecec;
      white-space: nowrap;
      transition: background 0.15s ease;
    }
    .ci-cancel:hover { background: #fbdcdc; }

    /* ----- Popup Modal ----- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(38, 38, 38, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 100;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal-card {
      width: 100%;
      max-width: 340px;
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      text-align: center;
      transform: translateY(10px) scale(0.97);
      transition: transform 0.2s ease;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .modal-overlay.show .modal-card { transform: translateY(0) scale(1); }
    .modal-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 26px;
      color: #fff;
    }
    .modal-card.success .modal-icon { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .modal-card.fail .modal-icon { background: linear-gradient(135deg, var(--ig-4), var(--ig-5)); }
    .modal-card.confirm .modal-icon { background: linear-gradient(135deg, var(--ig-2), var(--ig-4)); }
    .modal-title { font-weight: 600; font-size: 17px; margin-bottom: 6px; }
    .modal-message { font-size: 13.5px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; }
    .modal-btn {
      border: none;
      cursor: pointer;
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      font-family: 'Kanit', sans-serif;
      font-weight: 500;
      font-size: 14px;
    }
    .modal-btn.primary { color: #fff; background: linear-gradient(90deg, var(--ig-2), var(--ig-4) 50%, var(--ig-6)); }
    .modal-btn.danger { color: #fff; background: linear-gradient(135deg, var(--ig-4), var(--ig-5)); }
    .modal-btn.ghost { color: var(--muted); background: #f2f2f2; }

    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.5);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      margin-top: 22px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <h1>RESERVATIONS SPK OFFICE</h1>
      <p>Pick a room, date, and time — availability updates automatically.</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button type="button" class="tab active" id="tabBook">Book</button>
        <button type="button" class="tab" id="tabCancel">Cancel Booking</button>
      </div>

      <!-- ===== Booking tab ===== -->
      <form id="bookingForm" novalidate>
        <div class="field">
          <label for="room">Room</label>
          <select id="room" required>
            <option value="" disabled selected>-- Select Room --</option>
          </select>
        </div>

        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>

        <div class="field row-2">
          <div>
            <label for="startTime">Start</label>
            <select id="startTime" required disabled>
              <option value="" selected>-- Select room/date first --</option>
            </select>
          </div>
          <div>
            <label for="endTime">End</label>
            <select id="endTime" required disabled>
              <option value="" selected>-- Select start first --</option>
            </select>
          </div>
        </div>
        <div class="hint" id="slotHint"></div>

        <div class="booked-panel" id="bookedPanel" style="display:none;">
          <div class="booked-panel-title">Already booked</div>
          <ul class="booked-list" id="bookedList"></ul>
        </div>

        <div class="repeat-box">
          <div class="field" style="margin-bottom:14px;">
            <label for="repeatType">Repeat</label>
            <select id="repeatType">
              <option value="none" selected>No repeat (one time)</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly (same day)</option>
            </select>
          </div>
          <div class="field repeat-count-wrap" id="repeatCountWrap">
            <label for="repeatCount">Number of times (including first)</label>
            <input type="number" id="repeatCount" min="2" max="52" step="1" value="4">
            <div class="hint" id="repeatHint">Books consecutively and skips any dates already taken.</div>
          </div>
        </div>

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Full name" required>
        </div>

        <div class="field">
          <label for="phone">Tel</label>
          <input type="tel" id="phone" placeholder="0812345678" required>
        </div>

        <button type="submit" class="submit" id="submitBtn">Confirm Booking</button>
      </form>

      <!-- ===== Cancel tab ===== -->
      <div id="cancelPanel" style="display:none;">
        <div class="field">
          <label for="cancelPhone">Tel used for booking</label>
          <input type="tel" id="cancelPhone" placeholder="0812345678">
          <div class="hint" id="cancelHint">Enter the phone number you used to book to find your reservations.</div>
        </div>
        <button type="button" class="submit" id="cancelSearchBtn">Search Bookings</button>
        <ul class="cancel-list" id="cancelList"></ul>
      </div>
    </div>

    <div class="footer-note">Bookings are saved to Google Sheets automatically.</div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-message" id="modalMessage"></div>
      <div class="modal-actions">
        <button type="button" class="modal-btn danger" id="modalConfirmBtn" style="display:none;">Confirm</button>
        <button type="button" class="modal-btn ghost" id="modalCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <script>
    var tabBook = document.getElementById('tabBook');
    var tabCancel = document.getElementById('tabCancel');
    var bookingForm = document.getElementById('bookingForm');
    var cancelPanel = document.getElementById('cancelPanel');

    var roomSelect = document.getElementById('room');
    var dateInput = document.getElementById('date');
    var startSelect = document.getElementById('startTime');
    var endSelect = document.getElementById('endTime');
    var slotHint = document.getElementById('slotHint');
    var submitBtn = document.getElementById('submitBtn');
    var bookedPanel = document.getElementById('bookedPanel');
    var bookedList = document.getElementById('bookedList');
    var repeatType = document.getElementById('repeatType');
    var repeatCountWrap = document.getElementById('repeatCountWrap');
    var repeatCount = document.getElementById('repeatCount');

    var cancelPhone = document.getElementById('cancelPhone');
    var cancelHint = document.getElementById('cancelHint');
    var cancelSearchBtn = document.getElementById('cancelSearchBtn');
    var cancelList = document.getElementById('cancelList');

    var modalOverlay = document.getElementById('modalOverlay');
    var modalCard = document.getElementById('modalCard');
    var modalIcon = document.getElementById('modalIcon');
    var modalTitle = document.getElementById('modalTitle');
    var modalMessage = document.getElementById('modalMessage');
    var modalConfirmBtn = document.getElementById('modalConfirmBtn');
    var modalCloseBtn = document.getElementById('modalCloseBtn');

    var pendingConfirm = null;

    // Minimum date = today
    (function initDate() {
      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = String(today.getMonth() + 1).padStart(2, '0');
      var dd = String(today.getDate()).padStart(2, '0');
      dateInput.min = yyyy + '-' + mm + '-' + dd;
    })();

    function formatDate(dateStr) {
      var p = String(dateStr).split('-');
      if (p.length !== 3) return dateStr;
      return p[2] + '/' + p[1] + '/' + p[0];
    }

    // ----- Modal -----
    function showModal(type, title, message) {
      modalCard.className = 'modal-card ' + type;
      modalIcon.textContent = type === 'success' ? '✓' : '!';
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalConfirmBtn.style.display = 'none';
      modalCloseBtn.textContent = 'Close';
      pendingConfirm = null;
      modalOverlay.classList.add('show');
    }

    function showConfirm(title, message, confirmLabel, onConfirm) {
      modalCard.className = 'modal-card confirm';
      modalIcon.textContent = '?';
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalConfirmBtn.textContent = confirmLabel;
      modalConfirmBtn.style.display = 'block';
      modalCloseBtn.textContent = 'Not now';
      pendingConfirm = onConfirm;
      modalOverlay.classList.add('show');
    }

    function hideModal() { modalOverlay.classList.remove('show'); }

    modalConfirmBtn.addEventListener('click', function () {
      var cb = pendingConfirm;
      hideModal();
      if (cb) cb();
    });
    modalCloseBtn.addEventListener('click', hideModal);
    modalOverlay.addEventListener('click', function (e) { if (e.target === modalOverlay) hideModal(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') hideModal(); });

    // ----- Tabs -----
    function switchTab(which) {
      var booking = which === 'book';
      tabBook.classList.toggle('active', booking);
      tabCancel.classList.toggle('active', !booking);
      bookingForm.style.display = booking ? 'block' : 'none';
      cancelPanel.style.display = booking ? 'none' : 'block';
    }
    tabBook.addEventListener('click', function () { switchTab('book'); });
    tabCancel.addEventListener('click', function () { switchTab('cancel'); });

    // ----- Booking helpers -----
    function resetSelect(select, placeholder) {
      select.innerHTML = '';
      var opt = document.createElement('option');
      opt.value = '';
      opt.selected = true;
      opt.textContent = placeholder;
      select.appendChild(opt);
      select.disabled = true;
    }

    function fillOptions(select, times, placeholder) {
      select.innerHTML = '';
      if (!times || times.length === 0) {
        var opt = document.createElement('option');
        opt.value = '';
        opt.selected = true;
        opt.textContent = placeholder;
        select.appendChild(opt);
        select.disabled = true;
        return;
      }
      var def = document.createElement('option');
      def.value = '';
      def.disabled = true;
      def.selected = true;
      def.textContent = '-- Select time --';
      select.appendChild(def);
      times.forEach(function (t) {
        var opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        select.appendChild(opt);
      });
      select.disabled = false;
    }

    function loadRooms() {
      google.script.run.withSuccessHandler(function (rooms) {
        roomSelect.innerHTML = '';
        var def = document.createElement('option');
        def.value = '';
        def.disabled = true;
        def.selected = true;
        def.textContent = '-- Select Room --';
        roomSelect.appendChild(def);
        rooms.forEach(function (r) {
          var opt = document.createElement('option');
          opt.value = r.name;
          if (r.locked) {
            opt.disabled = true;
            opt.textContent = '🔒 ' + r.name + ' · ' + r.seats + ' seats (not open yet)';
          } else {
            opt.textContent = r.name + ' · ' + r.seats + ' seats';
          }
          roomSelect.appendChild(opt);
        });
      }).withFailureHandler(function (err) {
        showModal('fail', 'Failed to Load', 'Could not load the room list: ' + err.message);
      }).getRooms();
    }

    function renderBookedList(bookings) {
      bookedList.innerHTML = '';
      if (!bookings || bookings.length === 0) {
        bookedPanel.style.display = 'none';
        return;
      }
      bookedPanel.style.display = 'block';
      bookings.forEach(function (b) {
        var li = document.createElement('li');
        var time = document.createElement('span');
        time.className = 'time';
        time.textContent = b.startTime + ' - ' + b.endTime;
        var who = document.createElement('span');
        who.className = 'who';
        who.textContent = b.name || '';
        li.appendChild(time);
        li.appendChild(who);
        bookedList.appendChild(li);
      });
    }

    function loadBookedList() {
      var room = roomSelect.value;
      var date = dateInput.value;
      if (!room || !date) { renderBookedList([]); return; }
      google.script.run.withSuccessHandler(function (bookings) {
        renderBookedList(bookings);
      }).withFailureHandler(function () {
        renderBookedList([]);
      }).getExistingBookings(date, room);
    }

    function refreshStartTimes() {
      var room = roomSelect.value;
      var date = dateInput.value;

      resetSelect(endSelect, '-- Select start first --');
      slotHint.textContent = '';
      slotHint.className = 'hint';

      if (!room || !date) {
        resetSelect(startSelect, '-- Select room/date first --');
        renderBookedList([]);
        return;
      }

      startSelect.disabled = true;
      startSelect.innerHTML = '<option value="" selected>Checking availability...</option>';
      loadBookedList();

      google.script.run.withSuccessHandler(function (times) {
        fillOptions(startSelect, times, 'No time available today');
        if (!times || times.length === 0) {
          slotHint.textContent = 'This room is fully booked for the day. Please pick another room or date.';
          slotHint.className = 'hint error';
        } else {
          slotHint.textContent = times.length + ' time slot(s) available';
          slotHint.className = 'hint ok';
        }
      }).withFailureHandler(function (err) {
        showModal('fail', 'Availability Check Failed', err.message);
      }).getAvailableStartTimes(date, room);
    }

    function refreshEndTimes() {
      var room = roomSelect.value;
      var date = dateInput.value;
      var start = startSelect.value;

      if (!room || !date || !start) {
        resetSelect(endSelect, '-- Select start first --');
        return;
      }

      endSelect.disabled = true;
      endSelect.innerHTML = '<option value="" selected>Loading...</option>';

      google.script.run.withSuccessHandler(function (times) {
        fillOptions(endSelect, times, 'No time available');
      }).withFailureHandler(function (err) {
        showModal('fail', 'Failed to Load End Times', err.message);
      }).getAvailableEndTimes(date, room, start);
    }

    roomSelect.addEventListener('change', refreshStartTimes);
    dateInput.addEventListener('change', refreshStartTimes);
    startSelect.addEventListener('change', refreshEndTimes);

    repeatType.addEventListener('change', function () {
      repeatCountWrap.classList.toggle('show', repeatType.value !== 'none');
    });

    bookingForm.addEventListener('submit', function (e) {
      e.preventDefault();

      var payload = {
        date: dateInput.value,
        room: roomSelect.value,
        startTime: startSelect.value,
        endTime: endSelect.value,
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        repeatType: repeatType.value,
        repeatCount: parseInt(repeatCount.value, 10) || 1
      };

      if (!payload.date || !payload.room || !payload.startTime || !payload.endTime || !payload.name || !payload.phone) {
        showModal('fail', 'Incomplete', 'Please fill in all fields.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Saving...';

      google.script.run
        .withSuccessHandler(function (res) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Confirm Booking';
          if (res && res.success) {
            showModal('success', 'Booking Successful', res.message);
            bookingForm.reset();
            resetSelect(startSelect, '-- Select room/date first --');
            resetSelect(endSelect, '-- Select start first --');
            slotHint.textContent = '';
            renderBookedList([]);
            repeatCountWrap.classList.remove('show');
          } else {
            showModal('fail', 'Booking Failed', (res && res.message) || 'Could not save the booking. Please try again.');
            refreshStartTimes();
          }
        })
        .withFailureHandler(function (err) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Confirm Booking';
          showModal('fail', 'Error', err.message);
        })
        .submitReservation(payload);
    });

    // ----- Cancel flow -----
    function renderCancelList(bookings, phone) {
      cancelList.innerHTML = '';
      if (!bookings || bookings.length === 0) {
        cancelHint.textContent = 'No upcoming bookings found for this number.';
        cancelHint.className = 'hint error';
        return;
      }
      cancelHint.textContent = 'Found ' + bookings.length + ' booking(s). Tap "Cancel" to remove one.';
      cancelHint.className = 'hint ok';

      bookings.forEach(function (b) {
        var li = document.createElement('li');
        li.className = 'cancel-item';

        var info = document.createElement('div');
        var room = document.createElement('div');
        room.className = 'ci-room';
        room.textContent = b.room + ' · ' + formatDate(b.date);
        var time = document.createElement('div');
        time.className = 'ci-time';
        time.textContent = b.startTime + ' - ' + b.endTime + ' · ' + (b.name || '');
        info.appendChild(room);
        info.appendChild(time);

        var btn = document.createElement('button');
        btn.className = 'ci-cancel';
        btn.type = 'button';
        btn.textContent = 'Cancel';
        btn.addEventListener('click', function () {
          showConfirm(
            'Confirm Cancellation',
            'Cancel booking for ' + b.room + ' on ' + formatDate(b.date) + ' at ' + b.startTime + ' - ' + b.endTime + '?',
            'Yes, cancel booking',
            function () { doCancel(b.id, phone); }
          );
        });

        li.appendChild(info);
        li.appendChild(btn);
        cancelList.appendChild(li);
      });
    }

    function searchCancelBookings() {
      var phone = cancelPhone.value.trim();
      cancelList.innerHTML = '';
      if (!phone) {
        cancelHint.textContent = 'Please enter a phone number.';
        cancelHint.className = 'hint error';
        return;
      }
      cancelSearchBtn.disabled = true;
      cancelSearchBtn.innerHTML = '<span class="spinner"></span>Searching...';
      cancelHint.textContent = '';
      cancelHint.className = 'hint';

      google.script.run.withSuccessHandler(function (bookings) {
        cancelSearchBtn.disabled = false;
        cancelSearchBtn.textContent = 'Search Bookings';
        renderCancelList(bookings, phone);
      }).withFailureHandler(function (err) {
        cancelSearchBtn.disabled = false;
        cancelSearchBtn.textContent = 'Search Bookings';
        showModal('fail', 'Search Failed', err.message);
      }).getBookingsByPhone(phone);
    }

    function doCancel(id, phone) {
      google.script.run.withSuccessHandler(function (res) {
        if (res && res.success) {
          showModal('success', 'Cancelled', res.message);
          searchCancelBookings();
        } else {
          showModal('fail', 'Cancel Failed', (res && res.message) || 'Could not cancel the booking.');
        }
      }).withFailureHandler(function (err) {
        showModal('fail', 'Error', err.message);
      }).cancelReservation(id, phone);
    }

    cancelSearchBtn.addEventListener('click', searchCancelBookings);

    loadRooms();
  </script>
</body>
</html>
